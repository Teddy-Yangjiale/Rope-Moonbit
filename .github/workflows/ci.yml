name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Check versions
        run: moon version --all

      - name: Update dependencies
        run: moon update

      - name: Check
        run: moon check

      - name: Build
        run: moon build

      - name: Test
        run: moon test

      - name: Run example
        run: moon run examples
